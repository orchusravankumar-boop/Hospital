<!DOCTYPE html>
<html>
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Result</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
            margin:0;
            color:#111827;
        }

        .container{
            width:min(900px,92%);
            margin:auto;
            margin-top:50px;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:10px;
        }

        h1{
            font-size:clamp(28px,5vw,40px);
        }

        p{
            line-height:1.6;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:15px 30px;
            background:green;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

        @media(max-width:560px){
            .container{
                width:94%;
                margin-top:24px;
            }

            .card{
                padding:22px 18px;
            }

            .btn{
                display:block;
                text-align:center;
                padding:13px 18px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>AI Doctor Suggestion</h1>

        <h3>Your Problem:</h3>

        <p>{{ symptom }}</p>

        <hr>

        <h2>Suggested Doctor</h2>

        <p><b>Name:</b> {{ doctor.name }}</p>

        <p><b>Specialization:</b> {{ doctor.specialization }}</p>

        <p><b>Room Number:</b> {{ doctor.room_number }}</p>

        <p><b>OP Timings:</b> {{ doctor.op_timings }}</p>

        <a
            class="btn"

            href="/appointments/?doctor={{ doctor.name }}&specialization={{ doctor.specialization }}&room={{ doctor.room_number }}&timing={{ doctor.op_timings }}"
        >

            Book Your Appointment

        </a>

    </div>

</div>

</body>
</html>
