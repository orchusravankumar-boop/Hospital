<!DOCTYPE html>
<html>
<head>

    <title>AI Result</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
        }

        .container{
            width:70%;
            margin:auto;
            margin-top:50px;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:10px;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:15px 30px;
            background:green;
            color:white;
            text-decoration:none;
            border-radius:5px;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="card">

        <h1>AI Doctor Suggestion</h1>

        <h3>Your Problem:</h3>

        <p>{{ symptom }}</p>

        <hr>

        <h2>Suggested Doctor</h2>

        <p><b>Name:</b> {{ doctor.name }}</p>

        <p><b>Specialization:</b> {{ doctor.specialization }}</p>

        <p><b>Room Number:</b> {{ doctor.room_number }}</p>

        <p><b>OP Timings:</b> {{ doctor.op_timings }}</p>

        <a
            class="btn"

            href="/appointments/?doctor={{ doctor.name }}&specialization={{ doctor.specialization }}&room={{ doctor.room_number }}&timing={{ doctor.op_timings }}"
        >

            Book Your Appointment

        </a>

    </div>

</div>

</body>
</html>
