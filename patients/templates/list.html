<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patients</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #111827;
        }

        .container {
            width: min(1000px, 94%);
            margin: 0 auto;
            padding: 32px 0;
        }

        h1 {
            font-size: clamp(28px, 5vw, 42px);
            margin: 0 0 22px;
        }

        .patient-list {
            display: grid;
            gap: 14px;
        }

        .patient-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            background: white;
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.07);
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 10px 14px;
            border-radius: 7px;
            color: white;
            text-decoration: none;
            font-weight: 700;
        }

        .btn-primary {
            background: #2563eb;
        }

        .btn-danger {
            background: #dc2626;
        }

        @media (max-width: 560px) {
            .patient-card,
            .actions,
            .btn {
                width: 100%;
            }

            .btn {
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <main class="container">
        <h1>Patients</h1>

        <div class="patient-list">
            {% for p in patients %}
                <div class="patient-card">
                    <div>
                        <strong>{{ p.id }} - {{ p.name }}</strong><br>
                        {{ p.phone }}
                    </div>

                    <div class="actions">
                        <a href="/patients/{{ p.id }}/edit" class="btn btn-primary">Edit</a>
                        <a href="/patients/{{ p.id }}/delete" class="btn btn-danger">Delete</a>
                    </div>
                </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
