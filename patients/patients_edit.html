<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Patient</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            color: #111827;
        }

        .card {
            width: min(460px, 100%);
            background: white;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 22px;
            font-size: clamp(26px, 5vw, 36px);
        }

        input {
            width: 100%;
            margin-bottom: 14px;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 13px 18px;
            border: 0;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        @media (max-width: 560px) {
            body {
                align-items: flex-start;
                padding: 16px;
            }

            .card {
                padding: 22px 18px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Edit Patient</h1>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="name" value="{{ patient.name }}" placeholder="Patient name">
            <input type="text" name="phone" value="{{ patient.phone }}" placeholder="Phone number">
            <button type="submit">Save</button>
        </form>
    </main>
</body>
</html>
