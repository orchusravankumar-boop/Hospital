<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Doctors</title>

    <style>

        body{
            font-family:Arial;
            background:#f5f5f5;
            padding:40px;
            margin:0;
            color:#111827;
        }

        .card{
            background:white;
            padding:20px;
            margin-bottom:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px lightgray;
        }

        h1{
            font-size:clamp(28px,5vw,40px);
        }

        .card h2{
            font-size:clamp(22px,4vw,30px);
        }

        .card p{
            line-height:1.5;
        }

        @media(max-width:560px){
            body{
                padding:22px 14px;
            }

            .card{
                padding:18px;
                border-radius:8px;
            }
        }

    </style>

</head>
<body>

<h1>Doctors List</h1>

{% for doctor in doctors %}

<div class="card">

    <h2>Dr. {{ doctor.name }}</h2>

    <p><b>Specialization:</b> {{ doctor.specialization }}</p>

    <p><b>Phone:</b> {{ doctor.phone }}</p>

    <p><b>OP Timings:</b> {{ doctor.op_timings }}</p>

    <p><b>Room Number:</b> {{ doctor.room_number }}</p>

</div>

{% endfor %}

</body>
</html>
