services:
  - type: web
    name: sravhms
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn sravhms.wsgi:application
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: sravhms.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://sravhms.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: sravhms-db
          property: connectionString

databases:
  - name: sravhms-db
    plan: free
